document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

10%, #ffffff 0%, #eef0f4 60%, #e7eaef 100%);color:#1c2027;font-family:'Space Grotesk',sans-serif;padding:40px 44px 52px;\">\n  <div style=\"max-width:1320px;margin:0 auto;\">\n\n    <header style=\"text-align:left;margin-bottom:18px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#5566cc;margin-bottom:13px;\">1000 Genomes Project · IGSR<\u002Fdiv>\n      <h1 style=\"font-size:44px;font-weight:600;line-height:1.02;letter-spacing:-0.025em;color:#11141b;\">Reading the human genome, 2,504 times over<\u002Fh1>\n      <p style=\"margin:14px 0 0;font-size:15px;line-height:1.55;color:#5b6271;max-width:700px;\">The double helix runs across the strip, unwinds in the centre to expose the raw sequence the project read, then weaves back together before it leaves the frame.<\u002Fp>\n    <\u002Fheader>\n\n    <div style=\"display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:20px;\">\n      <div style=\"display:inline-flex;gap:5px;padding:5px;border-radius:11px;background:#fff;border:1px solid #dfe2e9;box-shadow:0 1px 3px rgba(20,30,60,0.05);\">\n        <button onclick=\"{{ setArt }}\" title=\"Artistic\" style=\"display:inline-flex;align-items:center;justify-content:center;padding:9px 14px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;background:{{ artBg }};color:{{ artCol }};\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.06 11.9l8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08\"><\u002Fpath><path d=\"M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n        <button onclick=\"{{ setSci }}\" title=\"Scientific\" style=\"display:inline-flex;align-items:center;justify-content:center;padding:9px 14px;border:none;border-radius:8px;cursor:pointer;transition:all .15s;background:{{ sciBg }};color:{{ sciCol }};\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"1\"><\u002Fcircle><path d=\"M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5Z\"><\u002Fpath><path d=\"M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5Z\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n      <a href=\"index.html\" title=\"Portrait version\" style=\"display:inline-flex;align-items:center;justify-content:center;color:#5566cc;text-decoration:none;border:1px solid #d3d8e6;border-radius:8px;padding:9px 13px;\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M19 12H5\"><\u002Fpath><path d=\"M12 19l-7-7 7-7\"><\u002Fpath><\u002Fsvg><\u002Fa>\n    <\u002Fdiv>\n\n    <!-- LANDSCAPE HERO -->\n    <div style=\"position:relative;background:radial-gradient(60% 100% at 50% 50%, #ffffff 0%, #eaedf3 82%);border:1px solid #e0e3ea;border-radius:18px;overflow:hidden;height:662px;margin-bottom:22px;box-shadow:0 2px 10px rgba(20,30,60,0.06);\">\n      <canvas id=\"hero-helix-canvas\" ref=\"{{ heroCanvas }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;\"><\u002Fcanvas>\n      <div style=\"position:absolute;top:18px;left:20px;z-index:2;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#9097a6;margin-bottom:3px;\">base pairs read<\u002Fdiv>\n        <div ref=\"{{ counterRef }}\" style=\"font-family:'Montserrat',sans-serif;font-size:26px;font-weight:600;color:#2b3550;letter-spacing:0.01em;\">0<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;top:18px;right:20px;z-index:2;text-align:right;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.06em;color:#9aa1b0;line-height:1.7;\">\n        <div>3.4&nbsp;nm / turn<\u002Fdiv>\n        <div>0.34&nbsp;nm / base<\u002Fdiv>\n        <div>2&nbsp;nm wide<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:absolute;bottom:14px;left:20px;z-index:2;display:flex;flex-direction:column;align-items:flex-start;gap:7px;\">\n        <div style=\"display:flex;gap:15px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6b7280;\">\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#149a76;\"><\u002Fspan>A<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#2a78bd;\"><\u002Fspan>T<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#bd8417;\"><\u002Fspan>C<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#de4f1c;\"><\u002Fspan>G<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:15px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#9aa1b0;\">\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:14px;height:6px;border-radius:3px;background:#ef6c43;\"><\u002Fspan>rare<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:14px;height:6px;border-radius:3px;background:#e0a13a;\"><\u002Fspan>low-freq<\u002Fspan>\n          <span style=\"display:flex;align-items:center;gap:5px;\"><span style=\"width:14px;height:6px;border-radius:3px;background:#2c7cc4;\"><\u002Fspan>common<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div ref=\"{{ triviaRef }}\" style=\"position:absolute;bottom:8px;right:18px;width:330px;opacity:0;transition:opacity .6s ease;z-index:6;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:7px;\">\n          <span style=\"width:7px;height:7px;border-radius:2px;background:#b0568c;\"><\u002Fspan>\n          <span ref=\"{{ triviaLabelRef }}\" style=\"font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8a909e;\"><\u002Fspan>\n        <\u002Fdiv>\n        <p ref=\"{{ triviaTextRef }}\" style=\"font-size:13.5px;line-height:1.55;color:#4a5160;height:106px;overflow:hidden;margin:0;\"><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CARDS ROW -->\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(228px,1fr));gap:14px;\">\n      <div style=\"background:#fff;border:1px solid #e4e7ee;border-radius:15px;padding:17px 19px;box-shadow:0 1px 3px rgba(20,30,60,0.05);\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\">\n          <span style=\"width:7px;height:7px;border-radius:2px;background:#ef6c43;\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8a909e;\">Scale &amp; rarity<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#4a5160;margin-bottom:12px;\">Of ~84M catalogued variants, the overwhelming majority are rare — present in fewer than 1 in 200 people.<\u002Fp>\n        <div style=\"display:flex;height:11px;border-radius:6px;overflow:hidden;background:#eef0f4;\">\n          <div style=\"width:76%;background:#ef6c43;\"><\u002Fdiv>\n          <div style=\"width:14%;background:#e0a13a;\"><\u002Fdiv>\n          <div style=\"width:10%;background:#2c7cc4;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#7a8090;margin-top:6px;\">\n          <span style=\"color:#d9542a;\">64M rare<\u002Fspan><span style=\"color:#b07e1e;\">12M<\u002Fspan><span style=\"color:#2c7cc4;\">8M<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ee;border-radius:15px;padding:17px 19px;box-shadow:0 1px 3px rgba(20,30,60,0.05);\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\">\n          <span style=\"width:7px;height:7px;border-radius:2px;background:#2c7cc4;\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8a909e;\">Reach<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#4a5160;\">Common variation is global; the rarer a variant, the more local it is. <b style=\"color:#1c2027;\">53%<\u002Fb> of rare variants sit in a single population.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:16px;margin-top:12px;\">\n          <div style=\"display:flex;align-items:center;gap:6px;\">\n            <span style=\"display:flex;gap:4px;\">\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#2c7cc4;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#2c7cc4;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#2c7cc4;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#2c7cc4;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#2c7cc4;\"><\u002Fspan>\n            <\u002Fspan>\n            <span style=\"font-size:10.5px;color:#8a909e;\">common → all<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:6px;\">\n            <span style=\"display:flex;gap:4px;\">\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#ef6c43;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#e6e9ef;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#e6e9ef;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#e6e9ef;\"><\u002Fspan>\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#e6e9ef;\"><\u002Fspan>\n            <\u002Fspan>\n            <span style=\"font-size:10.5px;color:#8a909e;\">rare → one<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #e4e7ee;border-radius:15px;padding:17px 19px;box-shadow:0 1px 3px rgba(20,30,60,0.05);\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\">\n          <span style=\"width:7px;height:7px;border-radius:2px;background:#1aa6a6;\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#8a909e;\">30× upgrade<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:13.5px;line-height:1.5;color:#4a5160;margin-bottom:11px;\">Resequencing the same samples at 30× (from low-coverage 7.4×) sharpened the rare end — quadrupling indel calls.<\u002Fp>\n        <div style=\"display:flex;gap:22px;\">\n          <div style=\"display:flex;align-items:baseline;gap:7px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:#11141b;\">×1.24<\u002Fspan><span style=\"font-size:11px;color:#8a909e;\">SNVs<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:7px;\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;color:#138a8a;\">×4.05<\u002Fspan><span style=\"font-size:11px;color:#8a909e;\">indels<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <div style=\"font-size:10.5px;line-height:1.5;color:#9097a6;margin-top:16px;text-align:center;\">Sources: 1000 Genomes Project Consortium, Nature 2015; Byrska-Bishop et al., Cell 2022. All figures verified.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  heroCanvas = React.createRef();\n  counterRef = React.createRef();\n  triviaRef = React.createRef();\n  triviaLabelRef = React.createRef();\n  triviaTextRef = React.createRef();\n  state = { view:'beautiful' };\n\n  TRIVIA(){ return [\n    {label:'Deepest diversity', text:'African-ancestry genomes — closest to humanity\\u2019s origin — carry the greatest number of variant sites; a single genome differs from the reference at 4.1–5.0M sites.'},\n    {label:'Coverage gap', text:'These 26 populations are not all of humanity — Middle Eastern, much of Southeast Asian, Slavic, Indigenous American, Ainu and Oceanian peoples are unsampled.'},\n  ]; }\n  startTrivia(){ this._ti=0; this._typeBox(); }\n  _typeBox(){\n    const box=this.triviaRef.current, lab=this.triviaLabelRef.current, txt=this.triviaTextRef.current;\n    if(!box||!txt||!lab){ this._tT=setTimeout(()=>this._typeBox(),300); return; }\n    const item=this.TRIVIA()[this._ti%this.TRIVIA().length];\n    lab.textContent=item.label; txt.textContent=''; box.style.opacity='1';\n    let j=0;\n    const type=()=>{\n      txt.textContent=item.text.slice(0,j); j++;\n      if(j<=item.text.length){ this._tT=setTimeout(type, 14); }\n      else { this._tT=setTimeout(()=>{ box.style.opacity='0'; this._tT=setTimeout(()=>{ this._ti++; this._typeBox(); }, 700); }, 10000); }\n    };\n    type();\n  }\n\n  componentDidMount(){\n    this._bp = 0; this._last = performance.now();\n    const loop = (t)=>{ try{ this.draw(t); }catch(e){} this._raf = requestAnimationFrame(loop); };\n    this._raf = requestAnimationFrame(loop);\n    this._onResize = ()=>{ this._sized = false; };\n    window.addEventListener('resize', this._onResize);\n    this.startTrivia();\n  }\n  componentWillUnmount(){ cancelAnimationFrame(this._raf); clearTimeout(this._tT); window.removeEventListener('resize', this._onResize); }\n\n  canvas(){ return this.heroCanvas.current || document.getElementById('hero-helix-canvas'); }\n  _h(n){ let x=(n*2654435761)>>>0; x^=x>>>15; x=(x*2246822519)>>>0; x^=x>>>13; return x>>>0; }\n  baseOf(i){ return this._h(i*9+1)%4; }\n  rarTier(i){ const r=(this._h(i*3+11)%1000)/1000; return r<0.76?0:(r<0.90?1:2); }\n  _lerp(a,b,t){ return a+(b-a)*t; }\n  _mix(c1,c2,t){ return [this._lerp(c1[0],c2[0],t),this._lerp(c1[1],c2[1],t),this._lerp(c1[2],c2[2],t)]; }\n  _rgb(a){ return `rgb(${Math.round(a[0])},${Math.round(a[1])},${Math.round(a[2])})`; }\n\n  draw(time){\n    const cv=this.canvas(); if(!cv) return;\n    const ctx=cv.getContext('2d');\n    const dpr=Math.min(window.devicePixelRatio||1,2);\n    const W=cv.clientWidth, H=cv.clientHeight; if(!W||!H) return;\n    if(!this._sized || cv.width!==Math.round(W*dpr)){ cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr); this._sized=true; }\n    ctx.setTransform(dpr,0,0,dpr,0,0);\n    ctx.clearRect(0,0,W,H);\n\n    const PI=Math.PI, cx=W*0.5, cy=H*0.5;\n    const R=Math.max(40, Math.min(H*0.30, W*0.085));\n    const f=R*3.2;\n    const sp=Math.max(15, W/54);\n    const twist=(32*PI)/180;\n    const rot=time*0.00038;\n    const scroll=time*0.0026;\n    const CX=cx, BW=W*0.27;                 // unzip bubble (centered)\n    const maxSep=R*1.5, r2=R*0.6, ribHalf=R*0.42;\n    const warmD=[170,68,40], warmL=[245,140,108];   // artistic strand A (#ee6c43)\n    const coolD=[188,191,200], coolL=[228,229,233];  // artistic strand B (#f0f1f5 −5%)\n    const rarCol=[[239,108,67],[224,161,58],[44,124,186]];\n    const lett=['A','T','C','G'];\n    const lcol=['#149a76','#2a78bd','#bd8417','#de4f1c'];\n    const lcolR=[[20,154,118],[42,120,189],[189,132,23],[222,79,28]], rungBg=[216,217,221];\n    const sm=x=>x*x*(3-2*x);\n    const mTarget=this.state.view==='scientific'?1:0;\n    if(this._m===undefined) this._m=mTarget;\n    this._m += (mTarget-this._m)*0.09;\n    const m=this._m, wU=1.9;\n\n    const AX=(u)=>-sp+(u-scroll)*sp;\n    const pt3=(u,strand)=>{\n      const th=u*twist+rot+(strand?PI:0);\n      const ax=AX(u);\n      let d=(ax-CX)/BW; let b=1-d*d; if(b<0) b=0; const te=sm(b);\n      const sgn=strand?1:-1;\n      const zipY=R*Math.cos(th), zipZ=R*Math.sin(th);\n      const uY=sgn*maxSep + r2*Math.cos(th), uZ=r2*Math.sin(th)*0.35;\n      const yrel=this._lerp(zipY,uY,te), z=this._lerp(zipZ,uZ,te);\n      return {ax, yrel, z3:z, face:Math.abs(Math.sin(th)), te};\n    };\n    const proj=(p)=>{ const s=f/(f-p.z3); return {x:p.ax, y:cy+p.yrel*s, zN:Math.max(0,Math.min(1,(p.z3+R)/(2*R))), s, face:p.face, te:p.te}; };\n    const pos=(u)=>{ const A=proj(pt3(u,0)), B=proj(pt3(u,1)); return {t:A.te, A, B}; };\n\n    const uStart=Math.floor(scroll)-2;\n    const samples=[];\n    for(let u=uStart;;u+=0.34){ const ax=AX(u); if(ax>W+sp*9) break; const P=pos(u); P.u=u; samples.push(P); if(samples.length>2000) break; }\n\n    const ops=[];\n    const L2=(a,b,t)=>[a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];\n    const ribbon=(strand,c1,c2)=>{\n      const n=samples.length; if(n<2) return;\n      const r0=[], r1=[];\n      for(let i=0;i<n;i++){ r0.push(proj(pt3(samples[i].u-wU/2,strand))); r1.push(proj(pt3(samples[i].u+wU/2,strand))); }\n      for(let i=0;i<n-1;i++){\n        const s0=samples[i], s1=samples[i+1], p=s0[strand?'B':'A'], q=s1[strand?'B':'A'];\n        const dx=q.x-p.x, dy=q.y-p.y; const len=Math.hypot(dx,dy)||0.001;\n        const nx=-dy/len, ny=dx/len;\n        const wp=ribHalf*(0.36+0.64*p.face)*p.s, wq=ribHalf*(0.36+0.64*q.face)*q.s;\n        const TpP=[p.x+nx*wp,p.y+ny*wp], TqP=[q.x+nx*wq,q.y+ny*wq], TqM=[q.x-nx*wq,q.y-ny*wq], TpM=[p.x-nx*wp,p.y-ny*wp];\n        const v0=L2(TpP,[r0[i].x,r0[i].y],m), v1=L2(TqP,[r0[i+1].x,r0[i+1].y],m), v2=L2(TqM,[r1[i+1].x,r1[i+1].y],m), v3=L2(TpM,[r1[i].x,r1[i].y],m);\n        const zN=(p.zN+q.zN)/2, bi=Math.round((s0.u+s1.u)/2);\n        const rc=rarCol[this.rarTier(bi)];\n        const artC=this._mix(c1,c2,0.16+0.84*zN);\n        const sciC=this._mix([rc[0]*0.55,rc[1]*0.55,rc[2]*0.55],rc,0.28+0.72*zN);\n        const col=this._mix(artC,sciC,m);\n        ops.push({z:zN, kind:'quad', col:this._rgb(col), a:0.62+0.38*zN, v:[v0,v1,v2,v3], hl:[v0,v1]});\n      }\n    };\n    ribbon(0,warmD,warmL);\n    ribbon(1,coolD,coolL);\n\n    const letters=[];\n    for(let u=Math.ceil(uStart);;u++){\n      const ax=AX(u); if(ax>W+sp*9) break; if(ax<-sp) continue;\n      const P=pos(u), a=P.A, b=P.B, zMid=(a.zN+b.zN)/2, te=P.t;\n      const ra=Math.min(1,(0.7+0.3*zMid));\n      const bi=this.baseOf(u), comp=bi^1;\n      if(ra>0.015) ops.push({z:zMid-0.03, kind:'rung', a, b, alpha:ra, colA:this._rgb(this._mix(rungBg,lcolR[bi],m)), colB:this._rgb(this._mix(rungBg,lcolR[comp],m))});\n      if(te>0.25){\n        letters.push({x:a.x, y:a.y-11*a.s, ch:lett[bi], col:lcol[bi], al:te*(0.78+0.22*a.zN), sc:a.s});\n        letters.push({x:b.x, y:b.y+11*b.s, ch:lett[comp], col:lcol[comp], al:te*(0.78+0.22*b.zN), sc:b.s});\n      }\n    }\n\n    ops.sort((m1,n1)=>m1.z-n1.z);\n    for(const o of ops){\n      if(o.kind==='quad'){\n        ctx.globalAlpha=o.a; ctx.fillStyle=o.col;\n        ctx.beginPath(); ctx.moveTo(o.v[0][0],o.v[0][1]);\n        for(let k=1;k<4;k++) ctx.lineTo(o.v[k][0],o.v[k][1]);\n        ctx.closePath(); ctx.fill();\n        ctx.globalAlpha=o.a*0.22*o.z; ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=1;\n        ctx.beginPath(); ctx.moveTo(o.hl[0][0],o.hl[0][1]); ctx.lineTo(o.hl[1][0],o.hl[1][1]); ctx.stroke();\n      } else {\n        const mx=(o.a.x+o.b.x)/2, my=(o.a.y+o.b.y)/2;\n        ctx.globalAlpha=o.alpha; ctx.lineWidth=2.0*((o.a.s+o.b.s)/2); ctx.lineCap='round';\n        ctx.strokeStyle=o.colA; ctx.beginPath(); ctx.moveTo(o.a.x,o.a.y); ctx.lineTo(mx,my); ctx.stroke();\n        ctx.strokeStyle=o.colB; ctx.beginPath(); ctx.moveTo(mx,my); ctx.lineTo(o.b.x,o.b.y); ctx.stroke();\n      }\n    }\n    for(const Lx of letters){\n      ctx.globalAlpha=Math.max(0,Math.min(1,Lx.al)); ctx.fillStyle=Lx.col;\n      ctx.font=`600 ${Math.round(11.5*Lx.sc)}px 'IBM Plex Mono', monospace`;\n      ctx.textAlign='center'; ctx.textBaseline='middle';\n      ctx.fillText(Lx.ch, Lx.x, Lx.y);\n    }\n    ctx.globalAlpha=1;\n\n    const now=performance.now(); const dt=Math.min(now-this._last,80); this._last=now;\n    this._bp += dt*520000;\n    if(this.counterRef.current) this.counterRef.current.textContent=Math.floor(this._bp).toLocaleString('en-US');\n  }\n\n  renderVals(){\n    const v=this.state.view, accent='#4a5ad6', inactive='#7a8290';\n    return {\n      heroCanvas:this.heroCanvas, counterRef:this.counterRef,\n      triviaRef:this.triviaRef, triviaLabelRef:this.triviaLabelRef, triviaTextRef:this.triviaTextRef,\n      setArt:()=>this.setState({view:'beautiful'}),\n      setSci:()=>this.setState({view:'scientific'}),\n      artBg: v!=='scientific'?accent:'transparent', artCol: v!=='scientific'?'#fff':inactive,\n      sciBg: v==='scientific'?accent:'transparent', sciCol: v==='scientific'?'#fff':inactive,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
